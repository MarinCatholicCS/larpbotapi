name: Poll recruiting inbox

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Tensorlake poll_recruiting_inbox
        run: |
          curl -sS -X POST "https://api.tensorlake.ai/applications/poll_recruiting_inbox" \
            -H "Authorization: Bearer ${{ secrets.TENSORLAKE_API_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d '""'
